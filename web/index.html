<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mobile_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mobile_app</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <style>
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #f093fb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      font-size: 18px;
      color: #f093fb;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <div id="loading" class="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎫 票务猎手 加载中...</div>
  </div>
  <script>
    // Global unhandled promise rejection handler for debugging
    window.addEventListener('unhandledrejection', function(event) {
      console.warn('Unhandled promise rejection:', event.reason);
      event.preventDefault(); // Prevent default error logging
    });
    
    window.addEventListener('load', function(ev) {
      // Download main.dart.js - disable service worker for debugging
      _flutter.loader.loadEntrypoint({
        // Disable service worker temporarily
        // serviceWorker: {
        //   serviceWorkerVersion: serviceWorkerVersion,
        // },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
            // Hide loading screen after app starts
            document.getElementById('loading').style.display = 'none';
          }).catch(function(error) {
            console.error('Flutter engine init error:', error);
            document.getElementById('loading').innerHTML = 
              '<div style="color: #f5576c;">加载失败，请刷新页面重试</div>';
          });
        }
      }).catch(function(error) {
        console.error('Flutter entrypoint load error:', error);
        document.getElementById('loading').innerHTML = 
          '<div style="color: #f5576c;">加载失败，请刷新页面重试</div>';
      });
    });
  </script>
</body>
</html>
