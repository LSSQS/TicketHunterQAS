workflows:
  build-ios:
    name: Build iOS App
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          # 直接在根目录运行，不需要进入 mobile_app
          flutter pub get
      - name: Build iOS (no code sign)
        script: |
          # 直接在根目录运行
          flutter build ios --release --no-codesign
    artifacts:
      # 修正产物路径，指向真实位置
      - build/ios/iphoneos/*.app